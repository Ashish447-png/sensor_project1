<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wafer Fault Prediction</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#667eea,#764ba2);
}

.container{
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.1);
    border-radius:15px;
    padding:40px;
    width:420px;
    text-align:center;
    color:white;
    box-shadow:0 8px 32px rgba(0,0,0,0.2);
}

h1{
    margin-bottom:25px;
    font-size:28px;
    font-weight:600;
}

.upload-box{
    border:2px dashed rgba(255,255,255,0.5);
    border-radius:10px;
    padding:35px;
    margin-bottom:25px;
    transition:0.3s;
}

.upload-box:hover{
    background:rgba(255,255,255,0.1);
    border-color:white;
}

.upload-box p{
    margin-bottom:10px;
    font-size:15px;
}

input[type=file]{
    color:white;
}

button{
    background:white;
    color:#764ba2;
    border:none;
    padding:12px 28px;
    border-radius:25px;
    font-size:16px;
    cursor:pointer;
    font-weight:600;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.footer{
    margin-top:25px;
    font-size:13px;
    opacity:0.8;
}

</style>
</head>

<body>

<div class="container">

<h1>Wafer Fault Detection</h1>

<form action="/predict" method="post" enctype="multipart/form-data">

<div class="upload-box">

<p>Upload CSV file for prediction</p>

<input type="file" name="file" accept=".csv" required>

</div>

<button type="submit">Predict</button>

</form>

<div class="footer">
ML Sensor Fault Detection System
</div>

</div>

</body>
</html>
